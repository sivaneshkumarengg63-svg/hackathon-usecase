name: Deploy to GKE

on:
  workflow_run:
    workflows: ["Build and Push Docker Images"]
    types:
      - completed
  workflow_dispatch:

env:
  GCP_REGION: us-central1
  GKE_CLUSTER: microservices-cluster

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: |
          gcloud components install gke-gcloud-auth-plugin

      - name: Get GKE Credentials
        run: |
          gcloud container clusters get-credentials ${{ env.GKE_CLUSTER }} \
            --region ${{ env.GCP_REGION }} \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Update K8s Manifests
        run: |
          sed -i "s|REGION|${{ env.GCP_REGION }}|g" k8s/*.yaml
          sed -i "s|PROJECT_ID|${{ secrets.GCP_PROJECT_ID }}|g" k8s/*.yaml

      - name: Deploy to GKE
        run: |
          kubectl apply -f k8s/patient-service.yaml
          kubectl apply -f k8s/application-service.yaml
          kubectl apply -f k8s/order-service.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/patient-service
          kubectl rollout status deployment/application-service
          kubectl rollout status deployment/order-service
          kubectl get services
          kubectl get ingress
